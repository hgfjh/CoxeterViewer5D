name: Bug report
description: Report a crash, broken interaction, rendering problem, or performance regression.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce the same viewer state.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Use the release tag, desktop version, or git commit hash.
      placeholder: "v0.1.0 or commit hash"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Web app from source
        - Windows desktop
        - macOS desktop
        - Linux desktop
        - Static web release bundle
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Start from the selected example, radius, view mode, and focused object if relevant.
      placeholder: |
        1. Load A3.
        2. Open Y_Gamma.
        3. Click the m=3 pair chip.
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include screenshots or console errors when useful.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Viewer state
      description: Paste a session, figure sidecar, warning text, or exported local-neighborhood JSON if it helps reproduce the issue.
      render: json
  - type: textarea
    id: system
    attributes:
      label: System details
      description: OS, browser, GPU, display scaling, or desktop package type.
      placeholder: "Windows 11, Chrome 126, NVIDIA/Intel GPU, 150% scaling"
